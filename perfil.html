<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" type="image/x-icon" href="api/img/icon.png">
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <style>
        .perfil-container {
            min-height: calc(100vh - 130px);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .perfil-card {
            max-width: 760px;
            width: 100%;
        }
        #perfil-foto-wrap {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid #d1d5db;
            overflow: hidden;
            flex-shrink: 0;
        }
        #perfil-foto-wrap img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .autor-foto-placeholder {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #67748a;
            font-size: 2.5rem;
            font-weight: 700;
        }
        .perfil-info {
            text-align: left;
        }
        .perfil-info h4,
        .perfil-info p {
            margin-bottom: 0.35rem;
        }
    </style>
    <title>Perfil - Prisma</title>
</head>

<body>
    <div id="top-nav" class="container-fluid">
        <svg width="170" height="100" href=".html">
            <text fill="#ffffff" font-size="30" font-family="Verdana" x="40" y="60">Prisma</text>
            <text fill="#ffffff" font-size="6" font-family="Verdana" x="51.5" y="70">ENSINO PERSONALIZADO</text>

            <polygon points="34.5,48 22.55,48 22.55,34"
                style="fill:#000103;stroke:#000103;stroke-width:1;fill-rule:evenodd;" />
            <polygon points="10,50.7 22.35,64 34.7,50.7"
                style="fill:#1FBDF4;stroke:#1FBDF4;stroke-width:1;fill-rule:evenodd;" />
            <polygon points="72,37 79,37 79,43 72,43"
                style="fill: #409DA1;stroke: rgb(255, 255, 255);stroke-width: 0;fill-rule: evenodd;" />
            <polygon points="69,36 73,38 75,42 77,38 81,36 77,34 75,30 73,34"
                style="fill: rgb(255, 255, 255);stroke: rgb(255, 255, 255);stroke-width: 0;fill-rule: evenodd;" />
        </svg>

        <form class="d-flex" action="pesq_aluno.html" method="GET">
            <input class="form-control me-2" type="text" name="q" placeholder="Search" aria-label="Search">
            <button class="btn btn-search" type="submit" aria-label="Search"> <i class="material-icons"
                    style="font-size: xx-large; float: left;">search</i>
            </button>
        </form>

        <div id="profile-offcanvas-wrapper">
            <button class="btn btn-config" type="button" data-bs-toggle="offcanvas" data-bs-target="#demo">
                <img src="api/img/toggle-navegation.png" alt="" width="45px">
            </button>

            <div class="offcanvas offcanvas-end" id="demo">
                <div class="offcanvas-header">
                    <div>
                        <i class="material-icons" style="font-size: xx-large; float: left;">settings</i>
                        <span style="font-size: larger;">Perfil</span>
                    </div>
                    <button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button>
                </div>
                <div class="offcanvas-body">
                    <div class="container-fluid">
                        <a href="perfil.html" style="text-decoration: none; color: inherit;">
                            <div>
                                <i class="material-icons" style="font-size: xx-large; float: left;">account_circle</i>
                                <span style="font-size: larger;">minha conta</span>
                            </div>
                        </a>
                        <br>
                        <a href="ajuda.html" style="text-decoration: none; color: inherit;">
                            <div>
                                <i class="material-icons" style="font-size: xx-large; float: left;">help_outline</i>
                                <span style="font-size: larger;">ajuda</span>
                            </div>
                        </a>
                        <br>
                        <a href="configuracoes.html" style="text-decoration: none; color: inherit;">
                            <div>
                                <i class="material-icons" style="font-size: xx-large; float: left;">settings</i>
                                <span style="font-size: larger;">configurações</span>
                            </div>
                        </a>
                        <br>
                        <a href="info.html" style="text-decoration: none; color: inherit;">
                            <div>
                                <i class="material-icons" style="font-size: xx-large; float: left;">info_outline</i>
                                <span style="font-size: larger;">info</span>
                            </div>
                        </a>
                        <br>
                        <div>
                            <i class="material-icons" style="font-size: xx-large; float: left;">exit_to_app</i>
                            <span style="font-size: larger;">
                                <button type="button" id="logout-offcanvas" class="btn btn-link p-0" style="color: inherit; text-decoration: none;">log out</button>
                            </span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="container perfil-container">
        <div class="card shadow-sm perfil-card">
            <div class="card-body text-center">
                <div class="d-flex flex-column flex-md-row align-items-center justify-content-center gap-3">
                    <div id="perfil-foto-wrap"></div>
                    <div class="perfil-info">
                        <h4 id="perfil-nome" class="mb-1"></h4>
                        <p class="text-muted mb-1"><span id="perfil-tipo"></span></p>
                        <p class="text-muted small mb-0" id="perfil-email"></p>
                    </div>
                </div>
                <button id="btn-alterar-perfil" type="button" class="btn btn-outline-primary mt-4 mb-4">Alterar informações</button>

                <div id="perfil-form-wrapper" class="d-none">
                    <form id="form-perfil">
                        <div class="row g-3">
                            <div class="col-12 col-md-6">
                                <label class="form-label">Nome</label>
                                <input id="input-nome" class="form-control" type="text" required>
                            </div>
                            <div class="col-12 col-md-6">
                                <label class="form-label">E-mail</label>
                                <input id="input-email" class="form-control" type="email" required>
                            </div>
                            <div class="col-12 col-md-6">
                                <label class="form-label">Senha atual</label>
                                <input id="input-senha-atual" class="form-control" type="password" placeholder="Deixe em branco se não alterar">
                            </div>
                            <div class="col-12 col-md-6">
                                <label class="form-label">Nova senha</label>
                                <input id="input-senha-nova" class="form-control" type="password" placeholder="Mínimo 6 caracteres">
                            </div>
                            <div class="col-12 col-md-6">
                                <label class="form-label">Confirmar nova senha</label>
                                <input id="input-senha-confirma" class="form-control" type="password" placeholder="Digite novamente">
                            </div>
                            <div class="col-12 col-md-6">
                                <label class="form-label">Foto de perfil</label>
                                <input id="input-foto" class="form-control" type="file" accept="image/*">
                            </div>
                        </div>
                        <div class="mt-4 d-flex justify-content-center gap-2 align-items-center flex-wrap">
                            <button id="btn-salvar-perfil" class="btn btn-primary">Salvar alterações</button>
                            <button id="btn-cancelar-edicao" type="button" class="btn btn-outline-secondary">Cancelar</button>
                            <span id="perfil-mensagem" class="text-success small d-none"></span>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script>
        console.log('perfil.html carregada');
    </script>
    <script src="js/offcanvas.js?v=2"></script>
    <script src="js/perfil.js?v=2"></script>

</body>

</html>
