<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" type="image/x-icon" href="api/img/icon.png">
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <title>Prisma Ensino Personalizado</title>
</head>

<body>
    <div id="top-nav" class="container-fluid">
        <svg width="170" height="100" href=".html">
            <text fill="#ffffff" font-size="30" font-family="Verdana" x="40" y="60">Prisma</text>
            <text fill="#ffffff" font-size="6" font-family="Verdana" x="51.5" y="70">ENSINO PERSONALIZADO</text>

            <polygon points="34.5,48 22.55,48 22.55,34"
                style="fill:#000103;stroke:#000103;stroke-width:1;fill-rule:evenodd;" />
            <polygon points="10,50.7 22.35,64 34.7,50.7"
                style="fill:#1FBDF4;stroke:#1FBDF4;stroke-width:1;fill-rule:evenodd;" />
            <polygon points="72,37 79,37 79,43 72,43"
                style="fill: #409DA1;stroke: rgb(255, 255, 255);stroke-width: 0;fill-rule: evenodd;" />
            <polygon points="69,36 73,38 75,42 77,38 81,36 77,34 75,30 73,34"
                style="fill: rgb(255, 255, 255);stroke: rgb(255, 255, 255);stroke-width: 0;fill-rule: evenodd;" />
        </svg>

        <form class="d-flex" action="pesq_aluno.html" method="GET">
            <input class="form-control me-2" type="text" name="q" placeholder="Search" aria-label="Search">
            <button class="btn btn-search" type="submit" aria-label="Search"> <i class="material-icons"
                    style="font-size: xx-large; float: left;">search</i>
            </button>
        </form>

        <a href="login.html" id="auth-button">Login</a>

        <button class="btn btn-config" type="button" data-bs-toggle="offcanvas" data-bs-target="#demo">
            <img src="api/img/toggle-navegation.png" alt="" width="45px">
        </button>

        <div class="offcanvas offcanvas-end" id="demo">
            <div class="offcanvas-header">
                <div>
                    <i class="material-icons" style="font-size: xx-large; float: left;">settings</i>
                    <span style="font-size: larger;">Perfil</span>
                </div>
                <button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button>
            </div>
            <div class="offcanvas-body">
                <div class="container-fluid">
                    <a href="perfil.html" style="text-decoration: none; color: inherit;">
                        <div>
                            <i class="material-icons" style="font-size: xx-large; float: left;">account_circle</i>
                            <span style="font-size: larger;">minha conta</span>
                        </div>
                    </a>
                    <br>
                    <a href="ajuda.html" style="text-decoration: none; color: inherit;">
                        <div>
                            <i class="material-icons" style="font-size: xx-large; float: left;">help_outline</i>
                            <span style="font-size: larger;">ajuda</span>
                        </div>
                    </a>
                    <br>
                    <a href="configuracoes.html" style="text-decoration: none; color: inherit;">
                        <div>
                            <i class="material-icons" style="font-size: xx-large; float: left;">settings</i>
                            <span style="font-size: larger;">configurações</span>
                        </div>
                    </a>
                    <br>
                    <a href="info.html" style="text-decoration: none; color: inherit;">
                        <div>
                            <i class="material-icons" style="font-size: xx-large; float: left;">info_outline</i>
                            <span style="font-size: larger;">info</span>
                        </div>
                    </a>
                    <br>
                    <div>
                        <i class="material-icons" style="font-size: xx-large; float: left;">exit_to_app</i>
                        <span style="font-size: larger;">
                            <button type="button" id="logout-offcanvas" class="btn btn-link p-0" style="color: inherit; text-decoration: none;">log out</button>
                        </span>
                    </div>
                </div>
            </div>
        </div>
    </div>

        <div class="container my-4">
            <div class="card shadow-sm">
                <div class="card-body">
                    <h4 class="mb-3">Criar novo conteúdo</h4>
                    <form id="form-conteudo">
                        <div class="mb-3">
                            <label class="form-label">Título</label>
                            <input id="input-titulo" class="form-control" type="text" placeholder="Título do conteúdo" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Tipo</label>
                            <select id="input-tipo" class="form-select">
                                <option value="aula">Aula</option>
                                <option value="postagem">Postagem</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Conteúdo</label>
                            <textarea id="input-corpo" class="form-control" rows="6" placeholder="Escreva o conteúdo..." required></textarea>
                        </div>
                        <button id="btn-criar-conteudo" type="submit" class="btn btn-primary">Publicar conteúdo</button>
                    </form>
                    <div id="mensagem-postagem" class="mt-3"></div>
                    <div id="resumo-postagem" class="mt-4"></div>
                </div>
            </div>
        </div>

    <script src="js/offcanvas.js"></script>
    <script src="js/postagem_prof.js"></script>
</body>
</html>
