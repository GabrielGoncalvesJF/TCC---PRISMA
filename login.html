<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" type="image/x-icon" href="api/img/icon.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <title>Login - Prisma</title>
</head>

<body>

    <div class="container">
        <div class="card attc">
            <div class="logo" style="margin-left: -2%; max-width: max-content;">
            <svg width="175" height="100" href=".html" >
                <text fill="#409DA1" font-size="40" font-family="Verdana" x="40" y="60">Prisma</text>
                <text fill="#409DA1" font-size="8" font-family="Verdana" x="51.5" y="70">ENSINO PERSONALIZADO</text>

                <polygon points="34.5,48 20.84,48 20.84,33"
                    style="fill:#000103;stroke:#000103;stroke-width:1;fill-rule:evenodd;" />
                <polygon points="5,50.7 20.14,65 34.7,50.7"
                    style="fill:#1FBDF4;stroke:#1FBDF4;stroke-width:1;fill-rule:evenodd;" />
                <polygon points="83.2,30 90.2,30 90.2,36 83.2,36"
                    style="fill: #DFF3FF;stroke: #DFF3FF;stroke-width: 0;fill-rule: evenodd;" />
                <polygon points="80.7,31 84.7,33 86.7,37 88.7,33 92.7,31 88.7,29 86.7,25 84.7,29"
                    style="fill: #1FBDF4;stroke: #1FBDF4;stroke-width: 0;fill-rule: evenodd;" />
            </svg>
            </div>

                <div class="form-group">
                <label for="email">E-mail</label>
                <input class="form-control me-2 attc" type="email" name="email" id="email" placeholder="Digite seu E-mail"
                    required>
                </div>

                <div class="form-group">
                <label for="senha">Senha</label>
                <input class="form-control me-2 attc" type="password" name="senha" id="senha" placeholder="Digite sua senha"
                    required>
                </div>

            <form class="d-flex" style="margin-top: 3%;">
                <button class="btn logar" type="submit">Entrar</button>
            </form>

            <div class="text">
                <span>Não possui uma conta? <a class="href" href="cadastro.html">Criar</a></span>
            </div>
        </div>
    </div>

    <script src="js/login.js"></script>

</body>

</html>
