<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css?v=3">
    <link rel="icon" type="image/x-icon" href="api/img/icon.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <title>Login - Prisma</title>
</head>

<body>

    <div class="container">
        <div class="card attc">
            <div class="logo" style="margin-left: -2%; max-width: max-content;">
                <img src="api/img/logo-black.png" alt="Prisma logo" class="site-logo" />
            </div>

                <div class="form-group">
                <label for="email">E-mail</label>
                <input class="form-control me-2 attc" type="email" name="email" id="email" placeholder="Digite seu E-mail"
                    required>
                </div>

                <div class="form-group">
                <label for="senha">Senha</label>
                <input class="form-control me-2 attc" type="password" name="senha" id="senha" placeholder="Digite sua senha"
                    required>
                </div>

            <form class="d-flex" style="margin-top: 3%;">
                <button class="btn logar" type="button">Entrar</button>
            </form>

            <div class="text">
                <span>Não possui uma conta? <a class="href" href="cadastro.html">Criar</a></span>
            </div>
        </div>
    </div>

    <script src="js/offcanvas.js"></script>
    <script src="js/login.js"></script>

</body>

</html>
