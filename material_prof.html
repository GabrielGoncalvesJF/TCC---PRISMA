<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" type="image/x-icon" href="api/img/icon.png">
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <style>
        summary {
            list-style: none;
            cursor: pointer;
        }
        summary::-webkit-details-marker {
            display: none;
        }
        .content-summary {
            width: 100%;
        }
        .content-summary:hover {
            text-decoration: none;
        }
        details[open] .card-body {
            border-top: 1px solid #dee2e6;
        }
        .viewer-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,.65);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1050;
            padding: 1rem;
        }
        .viewer-overlay.show {
            display: flex;
        }
        .viewer-panel {
            max-width: 100%;
            max-height: 100%;
            background: #fff;
            border-radius: .5rem;
            overflow: hidden;
            box-shadow: 0 0 30px rgba(0,0,0,.35);
            width: min(900px, 100%);
        }
        .viewer-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: .75rem 1rem;
            border-bottom: 1px solid #e9ecef;
            background: #f8f9fa;
        }
        .viewer-body {
            padding: 1rem;
            text-align: center;
        }
        .viewer-body img {
            max-width: 100%;
            max-height: 75vh;
            border-radius: .25rem;
        }
    </style>
    <title>Materiais — Prisma</title>
</head>

<body>
    <!-- NAVBAR -->
    <div id="top-nav" class="container-fluid">
        <svg width="170" height="100">
            <text fill="#ffffff" font-size="30" font-family="Verdana" x="40" y="60">Prisma</text>
            <text fill="#ffffff" font-size="6" font-family="Verdana" x="51.5" y="70">ENSINO PERSONALIZADO</text>
            <polygon points="34.5,48 22.55,48 22.55,34" style="fill:#000103;stroke:#000103;stroke-width:1;fill-rule:evenodd;" />
            <polygon points="10,50.7 22.35,64 34.7,50.7" style="fill:#1FBDF4;stroke:#1FBDF4;stroke-width:1;fill-rule:evenodd;" />
            <polygon points="72,37 79,37 79,43 72,43" style="fill:#409DA1;stroke:rgb(255,255,255);stroke-width:0;fill-rule:evenodd;" />
            <polygon points="69,36 73,38 75,42 77,38 81,36 77,34 75,30 73,34" style="fill:rgb(255,255,255);stroke:rgb(255,255,255);stroke-width:0;fill-rule:evenodd;" />
        </svg>

        <form class="d-flex" action="pesq_aluno.html" method="GET">
            <input class="form-control me-2" type="text" name="q" placeholder="Search" aria-label="Search">
            <button class="btn btn-search" type="submit" aria-label="Search">
                <i class="material-icons" style="font-size:xx-large;float:left;">search</i>
            </button>
        </form>

        <a href="login.html" id="auth-button">Login</a>

        <button class="btn btn-config" type="button" data-bs-toggle="offcanvas" data-bs-target="#demo">
            <img src="api/img/toggle-navegation.png" alt="" width="45px">
        </button>

        <div class="offcanvas offcanvas-end" id="demo">
            <div class="offcanvas-header">
                <div>
                    <i class="material-icons" style="font-size: xx-large; float: left;">settings</i>
                    <span style="font-size: larger;">Perfil</span>
                </div>
                <button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button>
            </div>
            <div class="offcanvas-body">
                <div class="container-fluid">
                    <a href="perfil.html" style="text-decoration: none; color: inherit;">
                        <div>
                            <i class="material-icons" style="font-size: xx-large; float: left;">account_circle</i>
                            <span style="font-size: larger;">minha conta</span>
                        </div>
                    </a>
                    <br>
                    <a href="ajuda.html" style="text-decoration: none; color: inherit;">
                        <div>
                            <i class="material-icons" style="font-size: xx-large; float: left;">help_outline</i>
                            <span style="font-size: larger;">ajuda</span>
                        </div>
                    </a>
                    <br>
                    <a href="configuracoes.html" style="text-decoration: none; color: inherit;">
                        <div>
                            <i class="material-icons" style="font-size: xx-large; float: left;">settings</i>
                            <span style="font-size: larger;">configurações</span>
                        </div>
                    </a>
                    <br>
                    <a href="info.html" style="text-decoration: none; color: inherit;">
                        <div>
                            <i class="material-icons" style="font-size: xx-large; float: left;">info_outline</i>
                            <span style="font-size: larger;">info</span>
                        </div>
                    </a>
                    <br>
                    <div>
                        <i class="material-icons" style="font-size: xx-large; float: left;">exit_to_app</i>
                        <span style="font-size: larger;">
                            <button type="button" id="logout-offcanvas" class="btn btn-link p-0" style="color: inherit; text-decoration: none;">log out</button>
                        </span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- CONTEÚDO -->
    <div class="container my-4">
        <div class="d-flex align-items-center justify-content-between mb-4">
            <h4 class="mb-0">Meus Conteúdos e Materiais</h4>
            <a href="postagem_prof.html" class="btn btn-primary btn-sm">
                <i class="material-icons" style="font-size:16px;vertical-align:middle;">add</i> Novo conteúdo
            </a>
        </div>

        <div id="loading" class="text-center py-5">
            <div class="spinner-border text-info" role="status"></div>
            <p class="mt-2 text-muted">Carregando seus conteúdos...</p>
        </div>

        <div id="vazio" class="alert alert-light d-none">
            Você ainda não criou nenhum conteúdo.
            <a href="postagem_prof.html">Criar primeiro conteúdo</a>
        </div>

        <div id="lista-conteudos"></div>
    </div>

    <div id="viewer-overlay" class="viewer-overlay">
        <div class="viewer-panel">
            <div class="viewer-header">
                <div>
                    <strong id="viewer-title">Visualização</strong>
                </div>
                <button id="viewer-close" type="button" class="btn-close" aria-label="Fechar"></button>
            </div>
            <div class="viewer-body">
                <img id="viewer-image" src="" alt="Preview de imagem">
                <p id="viewer-caption" class="mt-3 text-muted small"></p>
            </div>
        </div>
    </div>

    <script src="js/offcanvas.js"></script>
    <script src="js/material_prof.js"></script>
</body>
</html>
