<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css?v=3">
    <link rel="icon" type="image/x-icon" href="api/img/icon.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <title>Cadastro - Prisma</title>
</head>

<body>

    <div class="container">
        <div class="card cadastro">
            <div class="logo" style="margin-left: -2%; max-width: max-content;">
                <img src="api/img/logo-black.png" alt="Prisma logo" class="site-logo" />
            </div>

            <div class="form-group">
                <label for="nome">Nome</label>
                <input class="form-control me-2 attc" type="text" name="nome" id="nome" placeholder="Digite seu nome"
                    required>
            </div>

            <div class="form-group">
                <label for="email">E-mail</label>
                <input class="form-control me-2 attc" type="email" name="email" id="email"
                    placeholder="Digite seu E-mail" required>
            </div>

            <div class="form-group">
                <label for="senha">Senha</label>
                <input class="form-control me-2 attc" type="password" name="senha" id="senha"
                    placeholder="Digite sua senha" required>
            </div>

            <div class="form-group">
                <label for="senhaConfirma">Confirmar Senha</label>
                <input class="form-control me-2 attc" type="password" name="senhaConfirma" id="senhaConfirma"
                    placeholder="Confirme sua senha" required>
            </div>

            <form class="d-flex" style="margin-top: 3%;">
                <select class="form-control me-2 attc" for="tipo" name="tipo" id="tipo">
                    <option value="aluno">Aluno</option>
                    <option value="responsavel">Responsável</option>
                    <option value="professor">Professor</option>
                    <option value="diretoria">Diretoria</option>
                    <option value="administrador">Administrador</option>
                </select>
                <button class="btn cadastrar" type="button">Cadastrar</button>
            </form>

            <div class="text">
                <span>Já possui uma conta? <a class="href" href="login.html">Logar</a></span>
            </div>
            
        </div>
    </div>

    <script src="js/offcanvas.js"></script>
    <script src="js/cadastro.js"></script>


</body>

</html>
