<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css?v=3">
    <link rel="icon" type="image/x-icon" href="api/img/icon.png">
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <title>Forum - Prisma</title>
</head>

<body>
    <div id="top-nav" class="container-fluid">
        <img src="api/img/logo-black.png" alt="Prisma logo" class="site-logo" />

        <form class="d-flex" action="pesq_aluno.html" method="GET">
            <input class="form-control me-2" type="text" name="q" placeholder="Search" aria-label="Search">
            <button class="btn btn-search" type="submit" aria-label="Search"> <i class="material-icons"
                    style="font-size: xx-large; float: left;">search</i>
            </button>
        </form>

        <div id="auth-button-container">
            <a href="login.html" id="auth-button" class="btn-login">Login</a>
        </div>

        <!-- Offcanvas (mostrado via js quando usuário estiver logado) -->
        <div id="profile-offcanvas-wrapper" style="display: none;">
            <button class="btn btn-config" type="button" data-bs-toggle="offcanvas" data-bs-target="#demo">
                <img src="api/img/toggle-navegation.png" alt="" width="45px">
            </button>

            <div class="offcanvas offcanvas-end" id="demo">
                <div class="offcanvas-header">
                    <div>
                        <i class="material-icons" style="font-size: xx-large; float: left;">settings</i>
                        <span style="font-size: larger;">Perfil</span>
                    </div>
                    <button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button>
                </div>
                <div class="offcanvas-body">
                    <div class="container-fluid">
                        <a href="perfil.html" style="text-decoration: none; color: inherit;">
                            <div>
                                <i class="material-icons" style="font-size: xx-large; float: left;">account_circle</i>
                                <span style="font-size: larger;">minha conta</span>
                            </div>
                        </a>
                        <br>
                        <a href="ajuda.html" style="text-decoration: none; color: inherit;">
                            <div>
                                <i class="material-icons" style="font-size: xx-large; float: left;">help_outline</i>
                                <span style="font-size: larger;">ajuda</span>
                            </div>
                        </a>
                        <br>
                        <a href="configuracoes.html" style="text-decoration: none; color: inherit;">
                            <div>
                                <i class="material-icons" style="font-size: xx-large; float: left;">settings</i>
                                <span style="font-size: larger;">configurações</span>
                            </div>
                        </a>
                        <br>
                        <a href="info.html" style="text-decoration: none; color: inherit;">
                            <div>
                                <i class="material-icons" style="font-size: xx-large; float: left;">info_outline</i>
                                <span style="font-size: larger;">info</span>
                            </div>
                        </a>
                        <br>
                        <div>
                            <i class="material-icons" style="font-size: xx-large; float: left;">exit_to_app</i>
                            <span style="font-size: larger;">
                                <button type="button" id="logout-offcanvas" class="btn btn-link p-0" style="color: inherit; text-decoration: none;">log out</button>
                            </span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="container">
        <div class="main">
            <div class="forum-body">
            <div class="forum-tag mb-3">
                <h4>Fórum de Dúvidas</h4>
                <p class="text-muted">Leia os posts existentes, crie novas perguntas e responda quando estiver logado.</p>
            </div>

            <div class="forum-filtro mb-4">
                <button id="btn-toggle-post-form" class="btn btn-primary btn-sm mb-3">Nova pergunta</button>

                <div id="form-novo-post" class="card card-body mb-4 d-none">
                    <div class="mb-3">
                        <label class="form-label">Título</label>
                        <input id="input-post-titulo" class="form-control" type="text" placeholder="Digite o título da pergunta">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Descrição</label>
                        <textarea id="input-post-corpo" class="form-control" rows="4" placeholder="Explique sua dúvida..."></textarea>
                    </div>
                    <button id="btn-criar-post" class="btn btn-success">Publicar pergunta</button>
                    <div id="forum-mensagem" class="mt-3 text-danger small"></div>
                </div>
            </div>

            <div class="forum-conteudo">
                <div class="forum-lista"></div>
                <div id="forum-detalhe" class="card card-body d-none"></div>
            </div>
        </div>
        </div>
        <div class="footer">

        </div>
    </div>

    <script src="js/offcanvas.js"></script>
    <script src="js/forum.js"></script>
</body>

</html>
